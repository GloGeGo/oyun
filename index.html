<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Yunus Obby</title>
  <style>
    :root {
      --ui-bg: rgba(0,0,0,0.42);
      --ui-border: rgba(255,255,255,0.18);
      --text: #fff;
      --accent: #7cff8a;
      --danger: #ff6b6b;
      --warning: #ffd166;
    }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(#8fd3ff 0%, #b9e6ff 55%, #d9f4ff 100%);
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
    #ui {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      color: var(--text); background: var(--ui-bg); border: 1px solid var(--ui-border);
      border-radius: 14px; padding: 12px 14px; min-width: 220px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.22); backdrop-filter: blur(8px);
      user-select: none;
    }
    #ui .row { display: flex; justify-content: space-between; gap: 16px; margin: 4px 0; font-size: 14px; }
    #ui .title { font-weight: 800; font-size: 16px; margin-bottom: 8px; letter-spacing: 0.2px; }
    #ui .small { opacity: 0.9; font-size: 12px; line-height: 1.35; margin-top: 8px; }
    #barWrap {
      height: 10px; border-radius: 999px; overflow: hidden; margin-top: 10px;
      background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.15);
    }
    #bar { height: 100%; width: 0%; background: linear-gradient(90deg, #72ffb0, #7cf7ff); }
    #centerMsg {
      position: absolute; inset: 0; display: grid; place-items: center; z-index: 20;
      pointer-events: none;
    }
    #centerMsg .card {
      opacity: 0; transform: translateY(8px) scale(0.98);
      transition: 220ms ease;
      background: rgba(0,0,0,0.5); color: white; border: 1px solid rgba(255,255,255,0.16);
      padding: 18px 20px; border-radius: 18px; text-align: center; min-width: 280px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.25); backdrop-filter: blur(8px);
    }
    #centerMsg.show .card { opacity: 1; transform: translateY(0) scale(1); }
    #centerMsg .big { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
    #centerMsg .hint { font-size: 13px; opacity: 0.92; }
    #btnRestart {
      margin-top: 10px; border: none; border-radius: 12px; padding: 10px 14px;
      background: #ffffff; color: #111; font-weight: 800; cursor: pointer;
      pointer-events: auto; display: none;
    }
    #btnRestart:hover { transform: translateY(-1px); }
    #mobileControls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 12px;
      pointer-events: none;
      z-index: 15;
    }
    .padGroup {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    .touchBtn {
      width: 72px;
      height: 72px;
      border: none;
      border-radius: 22px;
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(0,0,0,0.22);
      backdrop-filter: blur(8px);
      -webkit-tap-highlight-color: transparent;
    }
    .touchBtn:active { transform: scale(0.96); background: rgba(0,0,0,0.58); }
    .touchBtn.jump { width: 96px; height: 96px; border-radius: 28px; background: rgba(124,255,138,0.22); border: 1px solid rgba(124,255,138,0.35); }
    @media (pointer: coarse), (max-width: 820px) {
      #mobileControls { display: flex; }
      #ui { top: 10px; left: 10px; right: 10px; min-width: 0; }
      #ui .small { font-size: 11px; }
    }
    @media (pointer: fine) {
      #mobileControls { display: none; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="title">Yunus Obby</div>
    <div class="row"><span>Bölüm</span><strong id="level">1 / 5</strong></div>
    <div class="row"><span>Checkpoint</span><strong id="checkpointCount">0</strong></div>
    <div class="row"><span>Zıplama</span><strong>Çift Zıplama</strong></div>
    <div id="barWrap"><div id="bar"></div></div>
    <div class="small">Mobil: ◀ ▶ ve Zıpla | Klavye: A/D veya ← →, Space / W / ↑ | Amaç: yeşil bitişe ulaş</div>
  </div>

  <div id="centerMsg">
    <div class="card">
      <div class="big" id="msgTitle">Hazır!</div>
      <div class="hint" id="msgText">İlk bölüm başlıyor.</div>
      <button id="btnRestart">Yeniden Başlat</button>
    </div>
  </div>

  <div id="mobileControls" aria-label="Mobil kontrol">
    <div class="padGroup">
      <button class="touchBtn" id="btnLeft">◀</button>
      <button class="touchBtn" id="btnRight">▶</button>
    </div>
    <div class="padGroup">
      <button class="touchBtn jump" id="btnJump">Zıpla</button>
    </div>
  </div>

  const DPR = Math.max(1, window.devicePixelRatio || 1);
  function resize() {
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const keys = Object.create(null);
  window.addEventListener('keydown', e => { keys[e.code] = true; });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  const touchState = { left: false, right: false, jumpPressed: false };
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const btnJump = document.getElementById('btnJump');

  function bindHoldButton(el, onDown, onUp) {
    const down = (e) => { e.preventDefault(); onDown(); };
    const up = (e) => { e.preventDefault(); onUp(); };
    el.addEventListener('pointerdown', down, { passive: false });
    el.addEventListener('pointerup', up, { passive: false });
    el.addEventListener('pointercancel', up, { passive: false });
    el.addEventListener('pointerleave', up, { passive: false });
    el.addEventListener('contextmenu', e => e.preventDefault());
  }

  bindHoldButton(btnLeft, () => touchState.left = true, () => touchState.left = false);
  bindHoldButton(btnRight, () => touchState.right = true, () => touchState.right = false);
  btnJump.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    touchState.jumpPressed = true;
    keys['Space'] = true;
  }, { passive: false });
  const clearJump = (e) => {
    e.preventDefault();
    touchState.jumpPressed = false;
    keys['Space'] = false;
  };
  btnJump.addEventListener('pointerup', clearJump, { passive: false });
  btnJump.addEventListener('pointercancel', clearJump, { passive: false });
  btnJump.addEventListener('pointerleave', clearJump, { passive: false });
  btnJump.addEventListener('contextmenu', e => e.preventDefault());

        { x: 1380, y: 335, w: 94, h: 18, axis: 'x', amp: 110, speed: 0.028, phase: 2.8 },
        { x: 1670, y: 295, w: 94, h: 18, axis: 'x', amp: 100, speed: 0.025, phase: 0.4 },
        { x: 1960, y: 255, w: 94, h: 18, axis: 'x', amp: 110, speed: 0.026, phase: 1.4 },
        { x: 2260, y: 295, w: 94, h: 18, axis: 'x', amp: 100, speed: 0.024, phase: 2.2 }
      ]
    }
  ];

  const COLORS = {
    playerHead: '#ffdbac',
    playerBody: '#1fd16f',
    playerLegs: '#2d6bff',
    outline: 'rgba(0,0,0,0.18)',
    solid: '#ffffff',
    checkpoint: '#ffdf4d',
    finish: '#50e36e',
    lava: '#ff5c2e'
  };

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  class Particle {
    constructor(x, y, vx, vy, life, size, color) {
      this.x = x; this.y = y; this.vx = vx; this.vy = vy;
      this.life = life; this.maxLife = life; this.size = size; this.color = color;
    }
    update(dt) {
      this.life -= dt;
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.vy += 0.8 * dt;
    }
    draw(ctx, camX, camY) {
      const a = clamp(this.life / this.maxLife, 0, 1);
      ctx.globalAlpha = a;
      ctx.fillStyle = this.color;
      ctx.beginPath();
      ctx.arc(this.x - camX, this.y - camY, this.size * a, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  class Platform {
    constructor(def) {
      Object.assign(this, def);
      this.baseX = def.x; this.baseY = def.y;
      this.prevX = def.x; this.prevY = def.y;
      this.vx = 0; this.vy = 0;
    }
    update(time) {
      this.prevX = this.x; this.prevY = this.y;
      if (this.axis === 'x') {
        this.x = this.baseX + Math.sin(time * this.speed + (this.phase || 0)) * this.amp;
      } else {
        this.y = this.baseY + Math.sin(time * this.speed + (this.phase || 0)) * this.amp;
      }
      this.vx = this.x - this.prevX;
      this.vy = this.y - this.prevY;
    }
    draw(ctx, camX, camY) {
      drawBlock(ctx, this.x, this.y, this.w, this.h, 'solid', camX, camY, true);
    }
  }

  class Player {
    constructor() {
      this.w = 30; this.h = 46;
      this.resetAll();
    }
    resetAll() {
      this.x = 0; this.y = 0; this.vx = 0; this.vy = 0;
      this.grounded = false; this.groundObj = null;
      this.coyote = 0; this.jumpBuffer = 0; this.doubleJumpUsed = false;
      this.face = 1; this.anim = 0; this.alive = true;
      this.respawn();
    }
    respawn() {
      const level = levels[world.currentLevel];
      const cp = level.checkpoint || level.spawn;
      this.x = cp.x;
      this.y = cp.y;
      this.vx = 0; this.vy = 0; this.grounded = false; this.groundObj = null;
      this.coyote = 0; this.jumpBuffer = 0; this.doubleJumpUsed = false;
      world.shake = Math.max(world.shake, 6);
      spawnBurst(this.x + this.w / 2, this.y + this.h / 2, '#ffffff', 10);
    }
    requestJump() { this.jumpBuffer = 0.14; }
    jump() {
      this.vy = -11.4;
      this.grounded = false;
      this.coyote = 0;
      this.doubleJumpUsed = true;
      spawnBurst(this.x + this.w / 2, this.y + this.h, '#bafcff', 8);
    }
    update(dt) {
      const left = keys['ArrowLeft'] || keys['KeyA'] || touchState.left;
      const right = keys['ArrowRight'] || keys['KeyD'] || touchState.right;
      const jumpKey = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jumpPressed;

      if (jumpKey) this.jumpBuffer = Math.max(this.jumpBuffer, 0.12);
      else this.jumpBuffer = Math.max(0, this.jumpBuffer - dt);

      const accel = 0.75;
      const friction = 0.82;
      const maxSpeed = 5.2;
      if (left) { this.vx -= accel * dt * 60; this.face = -1; }
      if (right) { this.vx += accel * dt * 60; this.face = 1; }
      if (!left && !right) this.vx *= Math.pow(friction, dt * 60);
      this.vx = clamp(this.vx, -maxSpeed, maxSpeed);

      if (this.grounded) this.coyote = 0.10; else this.coyote = Math.max(0, this.coyote - dt);
      this.vy += 0.48 * dt * 60;

      const jumpNow = this.jumpBuffer > 0;
      const canJump = this.grounded || this.coyote > 0;
      if (jumpNow && canJump) {
        this.jumpBuffer = 0;
        this.jump();
        touchState.jumpPressed = false;
        keys['Space'] = false;
      } else if (jumpNow && !this.doubleJumpUsed && !this.grounded && this.coyote <= 0) {
        this.jumpBuffer = 0;
        this.vy = -10.2;
        this.doubleJumpUsed = true;
        spawnBurst(this.x + this.w / 2, this.y + this.h / 2, '#ffd166', 7);
      }

      this.grounded = false;
      this.groundObj = null;

      // Horizontal move
      this.x += this.vx;
      resolveCollisions(this, 'x');

      // Vertical move
      this.y += this.vy;
      resolveCollisions(this, 'y');

      // Carry by platform if standing on it
      if (this.groundObj && this.groundObj.kind === 'platform') {
        this.x += this.groundObj.vx;
        this.y += this.groundObj.vy;
      }

      // Fall reset
      if (this.y > 900) this.respawn();

      this.anim += (Math.abs(this.vx) + (this.grounded ? 0.4 : 0.1)) * dt * 10;
    }
    draw(ctx, camX, camY, time) {
      const sx = this.x - camX;
      const sy = this.y - camY;
      const bob = Math.sin(time * 10) * (this.grounded ? 1.2 : 0.2);
      const legSwing = Math.sin(this.anim) * (this.grounded ? 5 : 2.5);
      const armSwing = Math.sin(this.anim + Math.PI) * (this.grounded ? 4 : 1.5);
      const lean = clamp(this.vx * 0.06, -0.18, 0.18);

      ctx.save();
      ctx.translate(sx + this.w / 2, sy + this.h / 2 + bob);
      ctx.rotate(lean);
      ctx.translate(-this.w / 2, -this.h / 2);

      // Shadow
      ctx.globalAlpha = 0.15;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(this.w/2, this.h + 7, 16, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Legs
      ctx.strokeStyle = COLORS.playerLegs;
      ctx.lineWidth = 6;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(11, 30);
      ctx.lineTo(7 + legSwing * 0.12, 44);
      ctx.moveTo(20, 30);
      ctx.lineTo(24 - legSwing * 0.12, 44);
      ctx.stroke();

      // Body
      ctx.fillStyle = COLORS.playerBody;
      roundRect(ctx, 5, 14, 20, 18, 6, true);

      // Arms
      ctx.strokeStyle = COLORS.playerBody;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(5, 19);
      ctx.lineTo(-1 + armSwing * 0.12, 28);
      ctx.moveTo(25, 19);
      ctx.lineTo(31 - armSwing * 0.12, 28);
      ctx.stroke();

      // Head
      ctx.fillStyle = COLORS.playerHead;
      roundRect(ctx, 6, 0, 18, 14, 5, true);
      ctx.fillStyle = 'rgba(0,0,0,0.12)';
      ctx.fillRect(9, 4, 10, 2);

      // Little shine
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(8, 2, 5, 2);

      ctx.restore();
    }
  }

  function roundRect(ctx, x, y, w, h, r, fill = false) {
    const rr = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    if (fill) ctx.fill();
  }

  function drawBlock(ctx, x, y, w, h, type, camX, camY, isPlatform = false) {
    const sx = x - camX;
    const sy = y - camY;
    let fill = COLORS.solid;
    if (type === 'checkpoint') fill = COLORS.checkpoint;
    if (type === 'finish') fill = COLORS.finish;
    if (type === 'lava') fill = COLORS.lava;

    if (type === 'lava') {
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(sx, sy, w, h, 8) : roundRect(ctx, sx, sy, w, h, 8, true);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      for (let i = 0; i < 4; i++) {
        const px = sx + 10 + i * (w / 4);
        ctx.beginPath();
        ctx.arc(px, sy + h/2 + Math.sin((performance.now()/120) + i) * 2, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      return;
    }

    // 3D-ish block
    ctx.fillStyle = fill;
    roundRect(ctx, sx, sy, w, h, 8, true);
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    roundRect(ctx, sx, sy + h - 6, w, 6, 0, true);
    ctx.fillStyle = 'rgba(255,255,255,0.16)';
    roundRect(ctx, sx, sy, w, 5, 8, true);

    if (type === 'checkpoint') {
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('CP', sx + 12, sy + 18);
    }
    if (type === 'finish') {
      ctx.fillStyle = 'rgba(0,0,0,0.16)';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('GOAL', sx + 12, sy + 18);
    }
  }

  let player = new Player();
  let currentPlatforms = [];
  let currentHazards = [];
  let currentBlocks = [];
  let levelWidth = 2000;
  let time = 0;
  let last = performance.now();

  function loadLevel(index) {
    world.currentLevel = clamp(index, 0, levels.length - 1);
    const level = levels[world.currentLevel];
    currentBlocks = level.blocks.map(b => ({ ...b }));
    currentHazards = level.hazards.map(h => ({ ...h }));
    currentPlatforms = level.movers.map(m => new Platform(m));
    levelWidth = level.width;
    level.checkpoint = null;
    player.x = level.spawn.x;
    player.y = level.spawn.y;
    player.vx = 0;
    player.vy = 0;
    player.grounded = false;
    player.groundObj = null;
    player.doubleJumpUsed = false;
    player.coyote = 0;
    touchState.jumpPressed = false;
    keys['Space'] = false;
    updateUi();
    showMessage(level.name, 'Bölüm başladı. Daha akıcı, daha kolay ve daha uzun hale getirildi.', 1.25);
  }

  function updateUi() {
    const level = levels[world.currentLevel];
    levelEl.textContent = `${world.currentLevel + 1} / ${levels.length}`;
    checkpointCountEl.textContent = String(world.checkpoints);
    const progress = clamp((player.x / Math.max(1, levelWidth)) * 100, 0, 100);
    barEl.style.width = progress + '%';
  }

  function showMessage(title, text, seconds = 1.5) {
    msgTitle.textContent = title;
    msgText.textContent = text;
    centerMsg.classList.add('show');
    btnRestart.style.display = world.finished ? 'inline-block' : 'none';
    clearTimeout(world.messageTimer);
    world.messageTimer = setTimeout(() => centerMsg.classList.remove('show'), seconds * 1000);
  }

  btnRestart.addEventListener('click', () => restartGame());

  function restartGame() {
    world.currentLevel = 0;
    world.checkpoints = 0;
    world.finished = false;
    touchState.left = false;
    touchState.right = false;
    touchState.jumpPressed = false;
    keys['Space'] = false;
    player.resetAll();
    loadLevel(0);
    showMessage('Yeniden Başladı', 'İlk bölüm tekrar başlıyor.', 1.1);
  }

  function spawnBurst(x, y, color, count = 6) {
    for (let i = 0; i < count; i++) {
      const a = (Math.PI * 2 * i) / count + Math.random() * 0.6;
      const s = 1.2 + Math.random() * 2.8;
      world.particles.push(new Particle(
        x, y,
        Math.cos(a) * (40 + Math.random() * 40),
        Math.sin(a) * (40 + Math.random() * 40) - 30,
        0.45 + Math.random() * 0.35,
        s,
        color
      ));
    }
  }

  function goNextLevel() {
    if (world.currentLevel < levels.length - 1) {
      showMessage('Bölüm Geçildi!', 'Sonraki bölüm açılıyor...', 1.1);
      setTimeout(() => loadLevel(world.currentLevel + 1), 450);
    } else {
      world.finished = true;
      showMessage('Tebrikler!', 'Tüm bölümler tamamlandı.', 999);
      btnRestart.style.display = 'inline-block';
      centerMsg.classList.add('show');
    }
  }

  function drawBackground(camX) {
    const w = window.innerWidth;
    const h = window.innerHeight;

    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#8ad7ff');
    grad.addColorStop(0.6, '#c8f1ff');
    grad.addColorStop(1, '#eefcff');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    // Far clouds
    for (const c of world.clouds) {
      const x = (c.x - camX * c.parallax + c.w * 2) % (levelWidth + 500) - 250;
      const y = c.y;
      ctx.globalAlpha = 0.34;
      ctx.fillStyle = '#fff';
      blobCloud(x, y, c.s);
      ctx.globalAlpha = 1;
    }

    // Distant hills
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = '#65c48a';
    for (let i = -1; i < 6; i++) {
      const base = i * 500 - (camX * 0.18) % 500;
      ctx.beginPath();
      ctx.ellipse(base + 220, h - 90, 200, 70, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Ground
    ctx.fillStyle = '#86d86a';
    ctx.fillRect(0, h - 52, w, 52);
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    for (let x = -((camX * 0.35) % 46); x < w + 50; x += 46) {
      ctx.fillRect(x, h - 52, 24, 52);
    }
  }

  function blobCloud(x, y, s) {
    ctx.beginPath(); ctx.arc(x, y, 18 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 20 * s, y + 5 * s, 24 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 44 * s, y, 16 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 28 * s, y - 12 * s, 18 * s, 0, Math.PI * 2); ctx.fill();
  }

  function updateClouds() {
    if (world.clouds.length === 0) {
      for (let i = 0; i < 10; i++) {
        world.clouds.push({
          x: Math.random() * 3000,
          y: 60 + Math.random() * 180,
          s: 0.7 + Math.random() * 1.2,
          parallax: 0.14 + Math.random() * 0.08
        });
      }
    }
  }

  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;
    time += dt;
    updateClouds();

    const level = levels[world.currentLevel];

    for (const p of currentPlatforms) p.update(time);
    player.update(dt);


    // Update particles
    for (let i = world.particles.length - 1; i >= 0; i--) {
      world.particles[i].update(dt * 60);
      if (world.particles[i].life <= 0) world.particles.splice(i, 1);
    }

    // Camera follow
    const targetX = clamp(player.x + player.w / 2 - window.innerWidth / 2, 0, Math.max(0, levelWidth - window.innerWidth));
    const targetY = 0;
    world.cameraX = lerp(world.cameraX, targetX, 0.12);
    world.cameraY = lerp(world.cameraY, targetY, 0.08);

    if (world.messageTimer && world.messageTimer > 0) {
      // no-op, handled by timeout
    }

    updateUi();

    // Screen shake
    const shakeX = (world.shake > 0) ? (Math.random() * world.shake - world.shake / 2) : 0;
    const shakeY = (world.shake > 0) ? (Math.random() * world.shake - world.shake / 2) : 0;
    world.shake = Math.max(0, world.shake - dt * 24);

    ctx.save();
    ctx.translate(shakeX, shakeY);
    drawBackground(world.cameraX);

    // World objects
    for (const p of currentPlatforms) p.draw(ctx, world.cameraX, world.cameraY);
    for (const b of currentBlocks) drawBlock(ctx, b.x, b.y, b.w, b.h, b.type, world.cameraX, world.cameraY);
    for (const h of currentHazards) drawBlock(ctx, h.x, h.y, h.w, h.h, 'lava', world.cameraX, world.cameraY);

    // Decorative arrows on tougher sections
    drawHints(level);

    for (const p of world.particles) p.draw(ctx, world.cameraX, world.cameraY);
    player.draw(ctx, world.cameraX, world.cameraY, time);

    // Finish glow overlay
    const fin = currentBlocks.find(b => b.type === 'finish');
    if (fin) {
      const sx = fin.x - world.cameraX + fin.w / 2;
      const sy = fin.y - world.cameraY + fin.h / 2;
      const pulse = 0.5 + 0.5 * Math.sin(time * 6);
      ctx.globalAlpha = 0.14 + pulse * 0.1;
      ctx.fillStyle = '#7cff8a';
      ctx.beginPath();
      ctx.arc(sx, sy, 40 + pulse * 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    requestAnimationFrame(loop);
  }

  function drawHints(level) {
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = 'bold 14px sans-serif';
    const labels = [
      { x: level.spawn.x + 150, y: 430, t: '→' },
      { x: (level.checkpoint?.x || 0) + 90, y: (level.checkpoint?.y || 0) + 120, t: 'CP' }
    ];
    for (const l of labels) {
      const sx = l.x - world.cameraX;
      const sy = l.y - world.cameraY;
      if (sx > -40 && sx < window.innerWidth + 40) ctx.fillText(l.t, sx, sy);
    }
    ctx.restore();
  }

  // Better ground/platform collision helpers using same objects as rects.
  function resolveCollisions(playerObj, axis) {
    const all = [];
    for (const b of currentBlocks) all.push({ ...b, kind: 'block' });
    for (const h of currentHazards) all.push({ ...h, kind: 'hazard' });
    for (const m of currentPlatforms) all.push({ x: m.x, y: m.y, w: m.w, h: m.h, type: 'solid', kind: 'platform', ref: m });

    for (const b of all) {
      if (!rectsOverlap(playerObj, b)) continue;

      if (b.kind === 'hazard' || b.type === 'lava') {
        spawnBurst(playerObj.x + playerObj.w / 2, playerObj.y + playerObj.h / 2, '#ffd166', 14);
        playerObj.respawn();
        return;
      }

      if (axis === 'x') {
        if (playerObj.vx > 0) playerObj.x = b.x - playerObj.w;
        else if (playerObj.vx < 0) playerObj.x = b.x + b.w;
        playerObj.vx = 0;
      } else {
        if (playerObj.vy > 0) {
          playerObj.y = b.y - playerObj.h;
          playerObj.vy = 0;
          playerObj.grounded = true;
          playerObj.doubleJumpUsed = false;
          playerObj.groundObj = b.kind === 'platform' ? { kind: 'platform', vx: b.ref.vx, vy: b.ref.vy } : null;
          if (b.type === 'checkpoint') {
            levels[world.currentLevel].checkpoint = { x: b.x + 8, y: b.y - 80 };
            world.checkpoints += 1;
            spawnBurst(b.x + b.w / 2, b.y, '#ffd166', 12);
            showMessage('Checkpoint!', 'Burası güvenli nokta.', 0.85);
          }
          if (b.type === 'finish') {
            spawnBurst(b.x + b.w / 2, b.y, '#7cff8a', 18);
            goNextLevel();
          }
        } else if (playerObj.vy < 0) {
          playerObj.y = b.y + b.h;
          playerObj.vy = 0;
        }
      }
    }
  }

  // Initialize
  loadLevel(0);
  requestAnimationFrame(loop);
  </script>
